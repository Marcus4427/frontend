<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aluno Online</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <main class="login-container">
    <header class="login-header">
      <img src="./public/learn.svg" alt="Logo Aluno Online" class="login-logo">
      <h1>Aluno Online</h1>
    </header>
    <form id="login-form" novalidate>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email">
      <p id="email-error" class="error-message" role="alert" aria-live="polite"></p>
      <label for="password">Senha:</label>
      <input type="password" id="password" name="password">
      <p id="password-error" class="error-message" role="alert" aria-live="polite"></p>
      <button type="submit">Entrar</button>
    </form>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
